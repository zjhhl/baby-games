<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>走迷宫 🐰</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #ecfdf5 0%, #f0f9ff 50%, #faf5ff 100%);
    height: 100dvh;
    display: flex;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  .game-container {
    width: 100%;
    max-width: 500px;
    height: 100dvh;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  /* ---- 头部 ---- */
  .header {
    text-align: center;
    flex-shrink: 0;
  }
  .header .title {
    font-size: 1.35rem;
    font-weight: 800;
    background: linear-gradient(135deg, #22c55e, #3b82f6, #8b5cf6);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .info {
    font-size: 0.9rem;
    color: #64748b;
    margin-top: 1px;
  }
  .header .info span { font-weight: 700; color: #8b5cf6; }

  /* ---- 迷宫画布 ---- */
  .maze-wrapper {
    background: white;
    border-radius: 16px;
    padding: 6px;
    box-shadow: 0 3px 16px rgba(0,0,0,0.05);
    flex-shrink: 0;
  }
  canvas {
    display: block;
    border-radius: 8px;
  }

  /* ---- 方向键 ---- */
  .controls {
    display: grid;
    grid-template-columns: 80px 80px 80px;
    grid-template-rows: 80px 80px 80px;
    gap: 8px;
    flex-shrink: 0;
  }
  .ctrl-btn {
    border-radius: 20px;
    border: none;
    font-size: 2rem;
    font-weight: 700;
    cursor: pointer;
    color: white;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    transition: transform 0.08s, filter 0.08s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active {
    transform: scale(0.88);
    filter: brightness(0.85);
  }
  .ctrl-up    { grid-column: 2; grid-row: 1; background: #22c55e; }
  .ctrl-left  { grid-column: 1; grid-row: 2; background: #3b82f6; }
  .ctrl-right { grid-column: 3; grid-row: 2; background: #8b5cf6; }
  .ctrl-down  { grid-column: 2; grid-row: 3; background: #f59e0b; }

  /* ---- 按钮 ---- */
  .action-row {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .btn {
    padding: 10px 24px;
    border-radius: 50px;
    border: none;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.94); }
  .btn-hint {
    background: #fef3c7;
    color: #92400e;
    box-shadow: 0 2px 8px rgba(245,158,11,0.15);
  }
  .btn-reset {
    background: #e2e8f0;
    color: #475569;
  }

  /* ---- 完成 ---- */
  .complete-screen {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex: 1;
  }
  .complete-screen .trophy {
    font-size: 3.5rem;
    animation: bounce 1s ease infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }
  .complete-screen .msg { font-size: 1.35rem; font-weight: 700; color: #1e293b; }
  .complete-screen .final-score { font-size: 1rem; color: #64748b; }
  .btn-next {
    padding: 12px 34px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 3px 12px rgba(34,197,94,0.3);
  }
  .btn-next:active { transform: scale(0.94); }

  .hidden { display: none !important; }

  .confetti-container {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  .confetti-piece {
    position: absolute;
    border-radius: 3px;
    animation: confetti-fall 1.5s ease-out forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-60px) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg) scale(0.3); opacity: 0; }
  }
</style>
</head>
<body>

<div class="game-container" id="gameContainer">
  <div class="header" id="headerArea">
    <div class="title">🐰 小兔走迷宫</div>
    <div class="info">第 <span id="levelNum">1</span> 关 &nbsp; 🥕 <span id="carrotCount">0</span></div>
  </div>

  <div class="maze-wrapper">
    <canvas id="mazeCanvas"></canvas>
  </div>

  <div class="controls" id="controlsArea">
    <button class="ctrl-btn ctrl-up"    id="btnUp">    ▲</button>
    <button class="ctrl-btn ctrl-left"  id="btnLeft">  ◀</button>
    <button class="ctrl-btn ctrl-right" id="btnRight"> ▶</button>
    <button class="ctrl-btn ctrl-down"  id="btnDown">  ▼</button>
  </div>

  <div class="action-row" id="actionRow">
    <button class="btn btn-hint" id="btnHint">💡 提示</button>
    <button class="btn btn-reset" id="btnReset">🔄 重来</button>
  </div>

  <div class="complete-screen hidden" id="completeScreen">
    <div class="trophy">🏆</div>
    <div class="msg">全部通关！</div>
    <div class="final-score" id="finalScore"></div>
    <button class="btn-next" id="btnReplay">🔄 再玩一次</button>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
// ========== 迷宫生成 (递归回溯) ==========
function generateMaze(cols, rows) {
  // 初始化：所有墙壁存在
  const cells = [];
  for (let r = 0; r < rows; r++) {
    cells[r] = [];
    for (let c = 0; c < cols; c++) {
      cells[r][c] = { top: true, right: true, bottom: true, left: true, visited: false };
    }
  }

  // DFS
  const stack = [];
  const startR = 0, startC = 0;
  cells[startR][startC].visited = true;
  stack.push([startR, startC]);

  const dirs = [[-1,0,'top','bottom'],[0,1,'right','left'],[1,0,'bottom','top'],[0,-1,'left','right']];

  while (stack.length > 0) {
    const [cr, cc] = stack[stack.length - 1];
    const neighbors = [];
    for (const [dr, dc, wall, opp] of dirs) {
      const nr = cr + dr, nc = cc + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !cells[nr][nc].visited) {
        neighbors.push([nr, nc, wall, opp]);
      }
    }
    if (neighbors.length === 0) {
      stack.pop();
    } else {
      const [nr, nc, wall, opp] = neighbors[Math.floor(Math.random() * neighbors.length)];
      cells[cr][cc][wall] = false;
      cells[nr][nc][opp] = false;
      cells[nr][nc].visited = true;
      stack.push([nr, nc]);
    }
  }

  // 清除 visited 标记
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      delete cells[r][c].visited;

  return cells;
}

// ========== 用 BFS 找最短路径（用于提示） ==========
function findShortestPath(cells, sr, sc, er, ec) {
  const rows = cells.length, cols = cells[0].length;
  const visited = Array.from({length: rows}, () => Array(cols).fill(false));
  const prev = Array.from({length: rows}, () => Array(cols).fill(null));
  const queue = [[sr, sc]];
  visited[sr][sc] = true;

  while (queue.length > 0) {
    const [r, c] = queue.shift();
    if (r === er && c === ec) break;
    const moves = [
      [r-1, c, 'top'],
      [r, c+1, 'right'],
      [r+1, c, 'bottom'],
      [r, c-1, 'left'],
    ];
    for (const [nr, nc, wall] of moves) {
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !visited[nr][nc] && !cells[r][c][wall]) {
        visited[nr][nc] = true;
        prev[nr][nc] = [r, c];
        queue.push([nr, nc]);
      }
    }
  }

  // 回溯路径
  const path = [];
  let cr = er, cc = ec;
  while (cr !== sr || cc !== sc) {
    if (!prev[cr][cc]) return []; // 不可达
    path.unshift([cr, cc]);
    [cr, cc] = prev[cr][cc];
  }
  path.unshift([sr, sc]);
  return path;
}

// ========== 关卡配置 ==========
const LEVELS = [
  { cols: 5, rows: 5, start: [4,0], end: [0,4] },
  { cols: 6, rows: 6, start: [5,0], end: [0,5] },
  { cols: 7, rows: 5, start: [4,0], end: [0,6] },
  { cols: 7, rows: 7, start: [6,0], end: [0,6] },
  { cols: 8, rows: 6, start: [5,0], end: [0,7] },
];

// ========== 游戏状态 ==========
let currentLevel = 0;
let cells, playerR, playerC, endR, endC, totalCarrots;
let canvas, ctx, cellSize;

// DOM
const mazeCanvas = document.getElementById('mazeCanvas');
const levelNum = document.getElementById('levelNum');
const carrotCount = document.getElementById('carrotCount');
const completeScreen = document.getElementById('completeScreen');
const headerArea = document.getElementById('headerArea');
const controlsArea = document.getElementById('controlsArea');
const actionRow = document.getElementById('actionRow');
const confettiContainer = document.getElementById('confettiContainer');

// ========== 纸屑 ==========
function spawnConfetti() {
  const colors = ['#22c55e','#3b82f6','#8b5cf6','#f59e0b','#ec4899','#14b8a6'];
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = -(Math.random() * 40) + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = Math.random() * 0.5 + 's';
    p.style.animationDuration = (1 + Math.random() * 2) + 's';
    p.style.width = (7 + Math.random() * 10) + 'px';
    p.style.height = (7 + Math.random() * 10) + 'px';
    frag.appendChild(p);
  }
  confettiContainer.appendChild(frag);
  setTimeout(() => { confettiContainer.innerHTML = ''; }, 2500);
}

// ========== 音频引擎（单例复用） ==========
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // iOS 要求在用户手势后 resume
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}

// 首次用户交互时激活音频
function initAudio() {
  const ac = getAudioCtx();
  if (ac.state === 'suspended') ac.resume();
}
document.addEventListener('touchstart', initAudio, { once: true });
document.addEventListener('click', initAudio, { once: true });

// ========== 胜利音效 ==========
function playSuccessSound() {
  try {
    const ac = getAudioCtx();
    const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
    const now = ac.currentTime;

    notes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = now + i * 0.12;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.3, t + 0.04);
      gain.gain.linearRampToValueAtTime(0.15, t + 0.2);
      gain.gain.linearRampToValueAtTime(0, t + 0.4);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(t);
      osc.stop(t + 0.45);
    });
  } catch(e) { /* 静默处理 */ }
}

// ========== 画迷宫 ==========
function drawMaze(showHintPath) {
  const rows = cells.length, cols = cells[0].length;
  // 动态计算 cellSize
  const availW = Math.min(window.innerWidth - 48, 460);
  const availH = window.innerHeight * 0.42; // 留空间给按钮
  const fromW = Math.floor(availW / cols);
  const fromH = Math.floor(availH / rows);
  cellSize = Math.min(fromW, fromH, 90); // 最大 90px，保证清晰
  const w = cols * cellSize, h = rows * cellSize;

  canvas = mazeCanvas;
  canvas.width = w;
  canvas.height = h;
  ctx = canvas.getContext('2d');

  // 背景
  ctx.fillStyle = '#fafbfc';
  ctx.fillRect(0, 0, w, h);

  // 提示路径
  if (showHintPath) {
    const path = findShortestPath(cells, playerR, playerC, endR, endC);
    for (const [r, c] of path) {
      const cx = c * cellSize + cellSize/2, cy = r * cellSize + cellSize/2;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, cellSize*0.45);
      grad.addColorStop(0, 'rgba(251, 191, 36, 0.55)');
      grad.addColorStop(1, 'rgba(251, 191, 36, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
    }
  }

  // 终点格光晕
  {
    const cx = endC * cellSize + cellSize/2, cy = endR * cellSize + cellSize/2;
    const grad = ctx.createRadialGradient(cx, cy, cellSize*0.15, cx, cy, cellSize*0.6);
    grad.addColorStop(0, 'rgba(34, 197, 94, 0.3)');
    grad.addColorStop(1, 'rgba(34, 197, 94, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(endC * cellSize, endR * cellSize, cellSize, cellSize);
  }

  // 画墙壁
  ctx.strokeStyle = '#64748b';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = c * cellSize, y = r * cellSize;
      if (cells[r][c].top)    { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); ctx.stroke(); }
      if (cells[r][c].right)  { ctx.beginPath(); ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); ctx.stroke(); }
      if (cells[r][c].bottom) { ctx.beginPath(); ctx.moveTo(x, y + cellSize); ctx.lineTo(x + cellSize, y + cellSize); ctx.stroke(); }
      if (cells[r][c].left)   { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + cellSize); ctx.stroke(); }
    }
  }

  // 画胡萝卜（终点）
  drawCarrot(endC * cellSize + cellSize/2, endR * cellSize + cellSize/2, cellSize * 0.42);

  // 画兔子（玩家）
  drawRabbit(playerC * cellSize + cellSize/2, playerR * cellSize + cellSize/2, cellSize * 0.42);
}

// ========== 画兔子 ==========
function drawRabbit(cx, cy, r) {
  ctx.save();
  // 白色底圆（光晕）
  ctx.beginPath();
  ctx.arc(cx, cy, r + 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fill();

  // 耳朵（左）
  ctx.beginPath();
  ctx.ellipse(cx - r*0.35, cy - r*1.05, r*0.2, r*0.55, 0, 0, Math.PI*2);
  ctx.fillStyle = '#e2e8f0';
  ctx.fill();
  ctx.strokeStyle = '#cbd5e1';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  // 耳朵内粉
  ctx.beginPath();
  ctx.ellipse(cx - r*0.35, cy - r*1.05, r*0.1, r*0.35, 0, 0, Math.PI*2);
  ctx.fillStyle = '#fbcfe8';
  ctx.fill();

  // 耳朵（右）
  ctx.beginPath();
  ctx.ellipse(cx + r*0.35, cy - r*1.05, r*0.2, r*0.55, 0, 0, Math.PI*2);
  ctx.fillStyle = '#e2e8f0';
  ctx.fill();
  ctx.strokeStyle = '#cbd5e1';
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(cx + r*0.35, cy - r*1.05, r*0.1, r*0.35, 0, 0, Math.PI*2);
  ctx.fillStyle = '#fbcfe8';
  ctx.fill();

  // 脸（圆）
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = '#f1f5f9';
  ctx.fill();
  ctx.strokeStyle = '#cbd5e1';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 眼睛
  ctx.fillStyle = '#1e293b';
  ctx.beginPath();
  ctx.arc(cx - r*0.3, cy - r*0.1, r*0.12, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + r*0.3, cy - r*0.1, r*0.12, 0, Math.PI*2);
  ctx.fill();
  // 眼睛高光
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(cx - r*0.25, cy - r*0.15, r*0.04, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + r*0.35, cy - r*0.15, r*0.04, 0, Math.PI*2);
  ctx.fill();

  // 鼻子
  ctx.fillStyle = '#fda4af';
  ctx.beginPath();
  ctx.moveTo(cx, cy + r*0.05);
  ctx.lineTo(cx - r*0.1, cy + r*0.2);
  ctx.lineTo(cx + r*0.1, cy + r*0.2);
  ctx.closePath();
  ctx.fill();

  // 胡须
  ctx.strokeStyle = '#cbd5e1';
  ctx.lineWidth = 0.7;
  for (const side of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(cx + side*r*0.15, cy + r*0.2);
    ctx.lineTo(cx + side*r*0.6, cy + r*0.05);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + side*r*0.15, cy + r*0.28);
    ctx.lineTo(cx + side*r*0.55, cy + r*0.35);
    ctx.stroke();
  }

  ctx.restore();
}

// ========== 画胡萝卜 ==========
function drawCarrot(cx, cy, r) {
  ctx.save();
  // 白色底圆
  ctx.beginPath();
  ctx.arc(cx, cy, r + 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fill();

  // 绿色叶子
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';
  const leafBase = cy - r*0.55;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(cx, leafBase);
    ctx.quadraticCurveTo(cx + i*r*0.5, leafBase - r*0.6, cx + i*r*0.55, leafBase - r*0.15);
    ctx.stroke();
  }

  // 橙色胡萝卜身（倒三角）
  ctx.beginPath();
  ctx.moveTo(cx - r*0.55, cy - r*0.35);
  ctx.lineTo(cx, cy + r*0.7);
  ctx.lineTo(cx + r*0.55, cy - r*0.35);
  ctx.closePath();
  const grad = ctx.createLinearGradient(cx, cy - r*0.35, cx, cy + r*0.7);
  grad.addColorStop(0, '#fb923c');
  grad.addColorStop(1, '#ea580c');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#c2410c';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // 胡萝卜纹路
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 0.6;
  for (let yy = cy - r*0.15; yy < cy + r*0.55; yy += r*0.18) {
    ctx.beginPath();
    ctx.moveTo(cx - r*0.3, yy);
    ctx.lineTo(cx + r*0.3, yy);
    ctx.stroke();
  }

  ctx.restore();
}

// ========== 移动 ==========
function move(dr, dc) {
  if (dr === -1 && cells[playerR][playerC].top) return;    // 有墙
  if (dr === 1  && cells[playerR][playerC].bottom) return;
  if (dc === 1  && cells[playerR][playerC].right) return;
  if (dc === -1 && cells[playerR][playerC].left) return;

  const nr = playerR + dr, nc = playerC + dc;
  if (nr < 0 || nr >= cells.length || nc < 0 || nc >= cells[0].length) return;

  playerR = nr;
  playerC = nc;
  drawMaze(false);

  // 到达终点？
  if (playerR === endR && playerC === endC) {
    totalCarrots++;
    carrotCount.textContent = totalCarrots;
    playSuccessSound();
    spawnConfetti();
    setTimeout(() => {
      if (currentLevel < LEVELS.length - 1) {
        currentLevel++;
        initLevel();
      } else {
        showComplete();
      }
    }, 800);
  }
}

// ========== 初始化关卡 ==========
function initLevel() {
  const lv = LEVELS[currentLevel];
  cells = generateMaze(lv.cols, lv.rows);
  [playerR, playerC] = lv.start;
  [endR, endC] = lv.end;
  levelNum.textContent = currentLevel + 1;
  drawMaze(false);
}

// ========== 按钮事件 ==========
document.getElementById('btnUp').addEventListener('click', () => move(-1, 0));
document.getElementById('btnDown').addEventListener('click', () => move(1, 0));
document.getElementById('btnLeft').addEventListener('click', () => move(0, -1));
document.getElementById('btnRight').addEventListener('click', () => move(0, 1));

document.getElementById('btnReset').addEventListener('click', () => {
  const lv = LEVELS[currentLevel];
  [playerR, playerC] = lv.start;
  drawMaze(false);
});

let hintVisible = false;
document.getElementById('btnHint').addEventListener('click', () => {
  hintVisible = !hintVisible;
  drawMaze(hintVisible);
  document.getElementById('btnHint').textContent = hintVisible ? '🙈 隐藏' : '💡 提示';
});

// 键盘操作
document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': move(-1, 0); break;
    case 'ArrowDown': case 's': case 'S': move(1, 0); break;
    case 'ArrowLeft': case 'a': case 'A': move(0, -1); break;
    case 'ArrowRight': case 'd': case 'D': move(0, 1); break;
  }
});

// ========== 滑屏手势 ==========
let touchStartX = 0, touchStartY = 0;
mazeCanvas.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });

mazeCanvas.addEventListener('touchend', (e) => {
  const dx = (e.changedTouches[0]?.clientX || touchStartX) - touchStartX;
  const dy = (e.changedTouches[0]?.clientY || touchStartY) - touchStartY;
  const threshold = 20;
  if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    move(0, dx > 0 ? 1 : -1);
  } else {
    move(dy > 0 ? 1 : -1, 0);
  }
});

// ========== 完成 ==========
function showComplete() {
  headerArea.classList.add('hidden');
  mazeCanvas.parentElement.classList.add('hidden');
  controlsArea.classList.add('hidden');
  actionRow.classList.add('hidden');
  completeScreen.classList.remove('hidden');
  document.getElementById('finalScore').textContent =
    `一共吃到 ${totalCarrots} 根胡萝卜！`;
  playSuccessSound();
  spawnConfetti();
}

document.getElementById('btnReplay').addEventListener('click', () => {
  currentLevel = 0;
  totalCarrots = 0;
  carrotCount.textContent = '0';
  headerArea.classList.remove('hidden');
  mazeCanvas.parentElement.classList.remove('hidden');
  controlsArea.classList.remove('hidden');
  actionRow.classList.remove('hidden');
  completeScreen.classList.add('hidden');
  hintVisible = false;
  document.getElementById('btnHint').textContent = '💡 提示';
  initLevel();
});

// ========== 启动 ==========
totalCarrots = 0;
initLevel();
</script>
