<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>表情找不同 😊</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #fef9c3 0%, #fdf2f8 40%, #f0f9ff 80%, #ecfdf5 100%);
    height: 100dvh;
    display: flex;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  .game-container {
    width: 100%;
    max-width: 500px;
    height: 100dvh;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  /* ---- 头部 ---- */
  .header {
    text-align: center;
    flex-shrink: 0;
  }
  .header .title {
    font-size: 1.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, #f59e0b, #ec4899, #8b5cf6);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .info {
    font-size: 0.9rem;
    color: #64748b;
    margin-top: 1px;
  }
  .header .info span { font-weight: 700; color: #ec4899; }

  /* ---- 提示文字 ---- */
  .hint-text {
    font-size: 1rem;
    color: #64748b;
    text-align: center;
    flex-shrink: 0;
    font-weight: 600;
  }

  /* ---- 表情网格 ---- */
  .emoji-grid {
    display: grid;
    gap: 10px;
    flex-shrink: 0;
  }
  .emoji-cell {
    background: white;
    border-radius: 16px;
    border: 3px solid #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 3rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
  }
  .emoji-cell:active { transform: scale(0.93); }
  .emoji-cell.found {
    border-color: #22c55e;
    background: #f0fdf4;
    box-shadow: 0 0 0 8px rgba(34,197,94,0.2);
    animation: pop 0.4s ease;
    pointer-events: none;
  }
  .emoji-cell.wrong-pick {
    border-color: #ef4444;
    background: #fef2f2;
    animation: shake 0.45s ease;
  }
  .emoji-cell.dimmed {
    pointer-events: none;
    opacity: 0.5;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* ---- 反馈 ---- */
  .feedback {
    font-size: 1.2rem;
    font-weight: 700;
    text-align: center;
    min-height: 30px;
    flex-shrink: 0;
  }
  .feedback.correct { color: #16a34a; }
  .feedback.wrong { color: #dc2626; }

  /* ---- 下一关按钮 ---- */
  .next-btn {
    padding: 11px 34px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #f59e0b, #ec4899);
    color: white;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 3px 12px rgba(236,72,153,0.3);
    transition: transform 0.1s;
  }
  .next-btn:active { transform: scale(0.94); }

  /* ---- 完成 ---- */
  .complete-screen {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex: 1;
  }
  .complete-screen .trophy {
    font-size: 4rem;
    animation: bounce 1s ease infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }
  .complete-screen .msg { font-size: 1.35rem; font-weight: 700; color: #1e293b; }
  .complete-screen .final-score { font-size: 1rem; color: #64748b; }
  .btn-replay {
    padding: 12px 34px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 3px 12px rgba(34,197,94,0.3);
  }
  .btn-replay:active { transform: scale(0.94); }

  .hidden { display: none !important; }

  /* ---- 纸屑 ---- */
  .confetti-container {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  .confetti-piece {
    position: absolute;
    border-radius: 3px;
    animation: confetti-fall 1.5s ease-out forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-60px) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg) scale(0.3); opacity: 0; }
  }
</style>
</head>
<body>

<div class="game-container" id="gameContainer">
  <div class="header" id="headerArea">
    <div class="title">😊 表情找不同</div>
    <div class="info">第 <span id="levelNum">1</span>/<span id="levelTotal">12</span> 关 &nbsp; ⭐ <span id="scoreDisplay">0</span></div>
  </div>

  <div class="hint-text" id="hintText">找出不一样的那个表情！</div>

  <div class="emoji-grid" id="emojiGrid"></div>

  <div class="feedback" id="feedback"></div>

  <button class="next-btn hidden" id="nextBtn">👉 下一关</button>

  <div class="complete-screen hidden" id="completeScreen">
    <div class="trophy">🏆</div>
    <div class="msg">全部通关！</div>
    <div class="final-score" id="finalScore"></div>
    <button class="btn-replay" id="btnReplay">🔄 再玩一次</button>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
// ========== 关卡配置 ==========
// normal: 多数表情, odd: 不同的那个, grid: [rows, cols]
const LEVELS = [
  { normal: '😄', odd: '😃',  grid: [4, 3], hint: '嘴巴张得不一样～' },
  { normal: '😗', odd: '😙',  grid: [4, 4], hint: '眼睛不同哦～' },
  { normal: '😒', odd: '😏',  grid: [4, 4], hint: '有一个在偷偷笑～' },
  { normal: '🐪', odd: '🐫',  grid: [4, 4], hint: '驼峰数量不一样！' },
  { normal: '☺️',  odd: '😊',  grid: [5, 4], hint: '笑脸也分好几种～' },
  { normal: '🌝', odd: '🌚',  grid: [5, 4], hint: '月亮脸色不对～' },
  { normal: '😬', odd: '😁',  grid: [5, 4], hint: '牙齿露得不一样～' },
  { normal: '🐕', odd: '🐶',  grid: [5, 5], hint: '狗狗长得不一样～' },
  { normal: '🐏', odd: '🐑',  grid: [5, 5], hint: '羊角不一样哦～' },
  { normal: '◀️',  odd: '▶️',  grid: [6, 5], hint: '方向反了！' },
  { normal: '🥰', odd: '😍',  grid: [6, 5], hint: '爱心在哪儿？' },
  { normal: '😀', odd: '😃',  grid: [6, 6], hint: '嘴巴形状...几乎一样' },
];

// ========== 游戏状态 ==========
let currentLevel = 0;
let score = 0;
let found = false;
let oddIndex = -1;

// DOM
const emojiGrid = document.getElementById('emojiGrid');
const feedback = document.getElementById('feedback');
const nextBtn = document.getElementById('nextBtn');
const levelNum = document.getElementById('levelNum');
const levelTotal = document.getElementById('levelTotal');
const scoreDisplay = document.getElementById('scoreDisplay');
const hintText = document.getElementById('hintText');
const headerArea = document.getElementById('headerArea');
const completeScreen = document.getElementById('completeScreen');
const confettiContainer = document.getElementById('confettiContainer');

// ========== 音频引擎 ==========
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
document.addEventListener('touchstart', () => getAudioCtx(), { once: true });
document.addEventListener('click', () => getAudioCtx(), { once: true });

function playSuccessSound() {
  try {
    const ac = getAudioCtx();
    const notes = [523.25, 659.25, 783.99, 1046.5];
    const now = ac.currentTime;
    notes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = now + i * 0.12;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.3, t + 0.04);
      gain.gain.linearRampToValueAtTime(0.15, t + 0.2);
      gain.gain.linearRampToValueAtTime(0, t + 0.4);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(t); osc.stop(t + 0.45);
    });
  } catch(e) {}
}

// ========== 纸屑 ==========
function spawnConfetti() {
  const colors = ['#f59e0b','#ec4899','#8b5cf6','#22c55e','#3b82f6','#14b8a6'];
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = -(Math.random() * 40) + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = Math.random() * 0.5 + 's';
    p.style.animationDuration = (1 + Math.random() * 2) + 's';
    p.style.width = (7 + Math.random() * 10) + 'px';
    p.style.height = (7 + Math.random() * 10) + 'px';
    frag.appendChild(p);
  }
  confettiContainer.appendChild(frag);
  setTimeout(() => { confettiContainer.innerHTML = ''; }, 2500);
}

// ========== 渲染关卡 ==========
function renderLevel() {
  const lv = LEVELS[currentLevel];
  const [rows, cols] = lv.grid;
  const total = rows * cols;

  found = false;
  feedback.textContent = '';
  feedback.className = 'feedback';
  nextBtn.classList.add('hidden');
  hintText.textContent = lv.hint;
  levelNum.textContent = currentLevel + 1;
  levelTotal.textContent = LEVELS.length;
  scoreDisplay.textContent = score;

  // 随机选一个位置放 odd emoji
  oddIndex = Math.floor(Math.random() * total);

  // 大网格用更小间距，腾出空间给格子
  const gap = cols >= 6 ? 5 : cols >= 5 ? 7 : 10;
  emojiGrid.style.gap = gap + 'px';

  // 动态计算格子大小
  const maxW = Math.min(window.innerWidth - 36, 470);
  const maxH = window.innerHeight * 0.55;
  const cellFromW = Math.floor((maxW - (cols - 1) * gap) / cols);
  const cellFromH = Math.floor((maxH - (rows - 1) * gap) / rows);
  const cellSize = Math.min(cellFromW, cellFromH, 110);

  const gridW = cellSize * cols + (cols - 1) * gap;
  const gridH = cellSize * rows + (rows - 1) * gap;

  emojiGrid.style.width = gridW + 'px';
  emojiGrid.style.height = gridH + 'px';
  emojiGrid.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
  emojiGrid.style.gridTemplateRows = `repeat(${rows}, ${cellSize}px)`;

  // 根据格子大小调整字号
  const fontSize = cellSize > 90 ? '2.6rem' : cellSize > 70 ? '2.2rem' : cellSize > 50 ? '1.8rem' : '1.5rem';

  emojiGrid.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const cell = document.createElement('div');
    cell.className = 'emoji-cell';
    cell.style.fontSize = fontSize;
    cell.style.width = cellSize + 'px';
    cell.style.height = cellSize + 'px';
    cell.textContent = i === oddIndex ? lv.odd : lv.normal;
    cell.addEventListener('click', () => handlePick(cell, i));
    emojiGrid.appendChild(cell);
  }
}

// ========== 点击处理 ==========
function handlePick(cell, index) {
  if (found) return;

  if (index === oddIndex) {
    // 找到了！
    found = true;
    cell.classList.add('found');
    feedback.textContent = '🎉 找到啦！真棒！';
    feedback.className = 'feedback correct';
    score += 10;
    scoreDisplay.textContent = score;
    playSuccessSound();
    spawnConfetti();

    // 其他格子变暗
    const cells = emojiGrid.querySelectorAll('.emoji-cell');
    cells.forEach(c => { if (c !== cell) c.classList.add('dimmed'); });

    // 自动下一关
    scheduleNext(1200);
  } else {
    // 点错了
    cell.classList.add('wrong-pick');
    feedback.textContent = '😊 再找找看～';
    feedback.className = 'feedback wrong';
    setTimeout(() => {
      cell.classList.remove('wrong-pick');
    }, 500);
  }
}

// ========== 自动/手动下一关 ==========
let nextTimer = null;

function scheduleNext(delay) {
  showNextButton();
  clearTimeout(nextTimer);
  nextTimer = setTimeout(() => goToNext(), delay);
}

function showNextButton() {
  if (currentLevel < LEVELS.length - 1) {
    nextBtn.textContent = '👉 下一关';
  } else {
    nextBtn.textContent = '🏆 看结果';
  }
  nextBtn.classList.remove('hidden');
}

function goToNext() {
  clearTimeout(nextTimer);
  currentLevel++;
  if (currentLevel < LEVELS.length) {
    renderLevel();
  } else {
    showComplete();
  }
}

nextBtn.addEventListener('click', () => goToNext());

// ========== 完成 ==========
function showComplete() {
  emojiGrid.classList.add('hidden');
  feedback.classList.add('hidden');
  nextBtn.classList.add('hidden');
  hintText.classList.add('hidden');
  headerArea.classList.add('hidden');
  completeScreen.classList.remove('hidden');

  const maxScore = LEVELS.length * 10;
  document.getElementById('finalScore').textContent =
    `找到了 ${score / 10} 个不同，共得 ${score} 分（满分 ${maxScore}）`;
  playSuccessSound();
  spawnConfetti();
}

document.getElementById('btnReplay').addEventListener('click', () => {
  currentLevel = 0;
  score = 0;
  scoreDisplay.textContent = '0';
  emojiGrid.classList.remove('hidden');
  feedback.classList.remove('hidden');
  hintText.classList.remove('hidden');
  headerArea.classList.remove('hidden');
  completeScreen.classList.add('hidden');
  renderLevel();
});

// ========== 启动 ==========
renderLevel();
</script>

</body>
</html>
