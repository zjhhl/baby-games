<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>宝宝学ABC 🌈</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: #fdf8f0;
    height: 100dvh; display: flex; justify-content: center; align-items: center;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; overflow: hidden;
  }
  .container {
    width: 100%; max-width: 500px; height: 100dvh; padding: 12px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }

  /* ---- 头部 ---- */
  .header { text-align: center; flex-shrink: 0; }
  .header h1 {
    font-size: 1.6rem; font-weight: 800;
    background: linear-gradient(135deg, #ef4444, #f59e0b, #22c55e, #3b82f6);
    background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .sub { font-size: 0.85rem; color: #94a3b8; }

  /* ---- 主卡片 ---- */
  .main-card {
    background: white; border-radius: 28px; width: 100%; flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.03); padding: 20px; gap: 10px;
    position: relative; overflow: hidden;
  }
  .main-card .big-letter {
    font-size: 8rem; font-weight: 900; line-height: 1;
    background: linear-gradient(180deg, #3b82f6 30%, #8b5cf6);
    background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    transition: transform 0.2s;
  }
  .main-card .big-letter.bounce { animation: letterBounce 0.5s ease; }
  @keyframes letterBounce {
    0% { transform: scale(1); } 30% { transform: scale(1.15); } 100% { transform: scale(1); }
  }
  .main-card .big-word {
    font-size: 2.2rem; font-weight: 700; color: #1e293b; letter-spacing: 3px;
  }
  .main-card .big-emoji { font-size: 4rem; }
  .main-card .big-cn { font-size: 1.1rem; color: #94a3b8; }
  .main-card .case-row { font-size: 1.2rem; color: #94a3b8; letter-spacing: 8px; }
  .main-card .case-row .h { color: #3b82f6; font-weight: 700; }

  /* ---- 按钮 ---- */
  .speak-big {
    width: 90px; height: 90px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #f59e0b, #f97316); color: white;
    font-size: 2.2rem; cursor: pointer;
    box-shadow: 0 6px 20px rgba(245,158,11,0.35);
    transition: transform 0.1s;
  }
  .speak-big:active { transform: scale(0.9); }
  .speak-big.speaking { background: linear-gradient(135deg, #22c55e, #16a34a); }

  .btn-row { display: flex; gap: 10px; flex-shrink: 0; }
  .btn {
    padding: 12px 24px; border-radius: 50px; border: none; font-size: 1rem;
    font-weight: 700; cursor: pointer; transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.94); }
  .btn-prev { background: #e2e8f0; color: #475569; }
  .btn-next { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; box-shadow: 0 3px 10px rgba(59,130,246,0.3); }
  .btn-quiz { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; box-shadow: 0 3px 10px rgba(34,197,94,0.3); }
  .btn-back { background: #e2e8f0; color: #475569; }

  /* ---- 底部字母条 ---- */
  .letter-strip {
    display: flex; gap: 3px; width: 100%; flex-shrink: 0; overflow-x: auto;
    padding: 4px 0; -webkit-overflow-scrolling: touch;
  }
  .letter-strip::-webkit-scrollbar { display: none; }
  .letter-chip {
    flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; font-weight: 700; cursor: pointer;
    background: white; border: 2px solid #e2e8f0; transition: all 0.15s;
  }
  .letter-chip.active { background: #3b82f6; color: white; border-color: #3b82f6; transform: scale(1.15); }
  .letter-chip.visited { background: #dbeafe; border-color: #93c5fd; }

  /* ---- 测验 ---- */
  .quiz-card {
    background: white; border-radius: 28px; width: 100%; flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.03); padding: 20px; gap: 16px;
  }
  .quiz-card .q-emoji { font-size: 5rem; }
  .quiz-card .q-text { font-size: 1.2rem; font-weight: 700; color: #64748b; }
  .quiz-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%;
  }
  .quiz-opt {
    background: white; border-radius: 18px; border: 3px solid #e2e8f0;
    padding: 14px; text-align: center; cursor: pointer;
    font-size: 1.8rem; font-weight: 700; color: #1e293b;
    transition: transform 0.08s, border-color 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  }
  .quiz-opt:active { transform: scale(0.94); }
  .quiz-opt.ok { border-color: #22c55e; background: #f0fdf4; color: #16a34a; }
  .quiz-opt.no { border-color: #ef4444; background: #fef2f2; color: #dc2626; animation: shake 0.4s ease; }
  .quiz-opt.dim { pointer-events: none; opacity: 0.35; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-5px); } 40% { transform: translateX(5px); }
    60% { transform: translateX(-3px); } 80% { transform: translateX(3px); }
  }
  .q-feedback { font-size: 1.2rem; font-weight: 700; min-height: 30px; }
  .q-feedback.ok { color: #16a34a; }
  .q-feedback.no { color: #dc2626; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="container" id="app">
  <!-- 学习模式 -->
  <div id="learnMode" style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;width:100%">
    <div class="header">
      <h1>🌈 宝宝学 ABC</h1>
      <div class="sub">第 <span id="grpNum">1</span>/6 组 &nbsp; 👆 点橙色按钮听发音</div>
    </div>

    <div class="main-card">
      <div class="case-row">
        <span id="caps">A B C D E</span>
      </div>
      <div class="big-letter" id="bigLetter">A</div>
      <div class="big-word" id="bigWord">Apple</div>
      <div class="big-emoji" id="bigEmoji">🍎</div>
      <div class="big-cn" id="bigCn">苹果</div>
      <button class="speak-big" id="speakBtn">🔊</button>
    </div>

    <div class="btn-row">
      <button class="btn btn-prev" id="prevBtn">◀ 上一个</button>
      <button class="btn btn-next" id="nextBtn">下一个 ▶</button>
      <button class="btn btn-quiz" id="goQuizBtn">🎮 小测验</button>
    </div>

    <div class="letter-strip" id="letterStrip"></div>
  </div>

  <!-- 测验模式 -->
  <div id="quizMode" class="hidden" style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;width:100%">
    <div class="header">
      <h1>🎮 听音找字母</h1>
      <div class="sub">第 <span id="qzNum">1</span>/<span id="qzTotal">10</span> 题 &nbsp; ⭐ <span id="qzScore">0</span></div>
    </div>

    <div class="quiz-card">
      <div class="q-emoji" id="qzEmoji"></div>
      <div class="q-text" id="qzText">这个用英文怎么说？</div>
      <button class="speak-big" id="qzSpeak" style="width:70px;height:70px;font-size:1.8rem">🔊</button>
      <div class="quiz-grid" id="qzGrid"></div>
      <div class="q-feedback" id="qzFeedback"></div>
    </div>

    <button class="btn btn-back" id="backBtn">← 回去学字母</button>
  </div>
</div>

<script>
// ============================================================
//  数据
// ============================================================
const ABC = [
  { u:'A', l:'a', w:'Apple',   e:'🍎', cn:'苹果' },
  { u:'B', l:'b', w:'Ball',    e:'⚽', cn:'球' },
  { u:'C', l:'c', w:'Cat',     e:'🐱', cn:'小猫' },
  { u:'D', l:'d', w:'Dog',     e:'🐶', cn:'小狗' },
  { u:'E', l:'e', w:'Egg',     e:'🥚', cn:'鸡蛋' },
  { u:'F', l:'f', w:'Fish',    e:'🐟', cn:'鱼' },
  { u:'G', l:'g', w:'Girl',    e:'👧', cn:'女孩' },
  { u:'H', l:'h', w:'Hat',     e:'🎩', cn:'帽子' },
  { u:'I', l:'i', w:'Ice',     e:'🍧', cn:'冰' },
  { u:'J', l:'j', w:'Juice',   e:'🧃', cn:'果汁' },
  { u:'K', l:'k', w:'Kite',    e:'🪁', cn:'风筝' },
  { u:'L', l:'l', w:'Lion',    e:'🦁', cn:'狮子' },
  { u:'M', l:'m', w:'Moon',    e:'🌙', cn:'月亮' },
  { u:'N', l:'n', w:'Nose',    e:'👃', cn:'鼻子' },
  { u:'O', l:'o', w:'Orange',  e:'🍊', cn:'橙子' },
  { u:'P', l:'p', w:'Panda',   e:'🐼', cn:'熊猫' },
  { u:'Q', l:'q', w:'Queen',   e:'👑', cn:'女王' },
  { u:'R', l:'r', w:'Rabbit',  e:'🐰', cn:'兔子' },
  { u:'S', l:'s', w:'Sun',     e:'☀️', cn:'太阳' },
  { u:'T', l:'t', w:'Tiger',   e:'🐯', cn:'老虎' },
  { u:'U', l:'u', w:'Up',      e:'⬆️', cn:'上面' },
  { u:'V', l:'v', w:'Van',     e:'🚐', cn:'面包车' },
  { u:'W', l:'w', w:'Water',   e:'💧', cn:'水' },
  { u:'X', l:'x', w:'Box',     e:'📦', cn:'盒子' },
  { u:'Y', l:'y', w:'Yes',     e:'👍', cn:'是的' },
  { u:'Z', l:'z', w:'Zoo',     e:'🏟️', cn:'动物园' },
];

// ============================================================
//  发音引擎
//  字母 → Web Speech API（读单个大写字母，正确率100%）
//  单词 → 预录制 m4a 音频文件
//  中文 → Web Speech API
// ============================================================
let currentAudio = null;

// 初始化 Web Speech
let enVoice = null;
let zhVoice = null;
function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (voices.length === 0) return;
  const en = voices.filter(v => v.lang.startsWith('en'));
  enVoice = en.find(v => v.lang === 'en-US' && /samantha|karen|alex|daniel|eva|zira|female/i.test(v.name))
         || en.find(v => v.lang === 'en-US') || en[0];
  const zh = voices.filter(v => v.lang.startsWith('zh'));
  zhVoice = zh.find(v => v.lang === 'zh-CN') || zh[0];
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
  setTimeout(loadVoices, 300);
  setTimeout(loadVoices, 1000);
}

// 激活语音引擎（iOS 要求用户手势后才能播）
function warmupSpeech() {
  if (!('speechSynthesis' in window)) return;
  loadVoices();
  // 播一个静音触发引擎
  const u = new SpeechSynthesisUtterance(' ');
  u.volume = 0; u.rate = 1;
  speechSynthesis.speak(u);
}

// 字母发音（预录制 m4a）
function speakLetterAudio(letter) {
  return new Promise((resolve) => {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    const a = new Audio('audio/' + letter.toLowerCase() + '.m4a');
    currentAudio = a;
    a.onended = () => { currentAudio = null; resolve(); };
    a.onerror = () => { currentAudio = null; resolve(); };
    a.play().catch(() => { currentAudio = null; resolve(); });
  });
}

// 单词发音（预录制 m4a）
function playWord(word) {
  stopAudio();
  const a = new Audio('audio/' + word + '.m4a');
  currentAudio = a;
  a.play().catch(() => {});
  a.onended = () => { currentAudio = null; };
}

// 中文发音
function speakChinese(text) {
  return new Promise((resolve) => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = 0.75; u.volume = 1.0;
    if (zhVoice) u.voice = zhVoice;
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}

// ============================================================
//  状态
// ============================================================
let currentIdx = 0;       // 当前字母索引 0-25
let quizList = [];
let quizIdx = 0;
let quizScore = 0;
let quizAnswered = false;

// ============================================================
//  学习模式
// ============================================================
function renderStrip() {
  const strip = document.getElementById('letterStrip');
  strip.innerHTML = '';
  ABC.forEach((item, i) => {
    const chip = document.createElement('div');
    chip.className = 'letter-chip' + (i === currentIdx ? ' active' : '');
    chip.textContent = item.u;
    chip.onclick = () => { stopAudio(); currentIdx = i; renderLearn(); };
    strip.appendChild(chip);
  });
  // 滚动到当前字母
  const active = strip.querySelector('.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function renderLearn() {
  const item = ABC[currentIdx];
  // 组号
  document.getElementById('grpNum').textContent = Math.floor(currentIdx / 5) + 1;
  // 本组大写字母
  const grpStart = Math.floor(currentIdx / 5) * 5;
  const grpLetters = ABC.slice(grpStart, grpStart + 5).map(x => x.u).join(' ');
  document.getElementById('caps').innerHTML = grpLetters.split('').map((ch, i) =>
    grpStart + i === currentIdx ? `<span class="h">${ch}</span>` : ch
  ).join('');
  // 主卡片
  document.getElementById('bigLetter').textContent = item.u;
  document.getElementById('bigLetter').classList.remove('bounce');
  void document.getElementById('bigLetter').offsetWidth;
  document.getElementById('bigLetter').classList.add('bounce');
  document.getElementById('bigWord').textContent = item.w;
  document.getElementById('bigEmoji').textContent = item.e;
  document.getElementById('bigCn').textContent = item.cn;
  renderStrip();
}

let speakAbort = false;

async function speakCurrentLetter() {
  const item = ABC[currentIdx];
  const btn = document.getElementById('speakBtn');

  speakAbort = false;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  btn.classList.add('speaking');

  // 字母 → 单词 → 字母 → 单词 → 中文
  if (!speakAbort) await speakLetterAudio(item.u);
  if (!speakAbort) { playWord(item.w.toLowerCase()); await sleep(1100); }
  if (!speakAbort) await speakLetterAudio(item.u);
  if (!speakAbort) { playWord(item.w.toLowerCase()); await sleep(1100); }
  if (!speakAbort) await speakChinese(item.cn);

  btn.classList.remove('speaking');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ============================================================
//  测验模式
// ============================================================
function startQuiz() {
  // 从已学过的字母中随机选10题（至少看过一眼的）
  const pool = ABC;
  quizList = shuffle(pool).slice(0, 10);
  quizIdx = 0; quizScore = 0;
  document.getElementById('qzScore').textContent = '0';
  document.getElementById('qzTotal').textContent = quizList.length;
  document.getElementById('learnMode').classList.add('hidden');
  document.getElementById('quizMode').classList.remove('hidden');
  renderQuiz();
}

function renderQuiz() {
  quizAnswered = false;
  const item = quizList[quizIdx];
  document.getElementById('qzNum').textContent = quizIdx + 1;
  document.getElementById('qzScore').textContent = quizScore;
  document.getElementById('qzEmoji').textContent = item.e;
  document.getElementById('qzText').textContent = '这个用英文怎么说？';
  document.getElementById('qzFeedback').textContent = '';
  document.getElementById('qzFeedback').className = 'q-feedback';

  // 正确选项 + 3个干扰项
  const correct = { word: item.w, isCorrect: true };
  const others = shuffle(ABC.filter(x => x.u !== item.u)).slice(0, 3)
    .map(x => ({ word: x.w, isCorrect: false }));
  const opts = shuffle([correct, ...others]);

  const grid = document.getElementById('qzGrid');
  grid.innerHTML = '';
  opts.forEach(opt => {
    const card = document.createElement('div');
    card.className = 'quiz-opt';
    card.textContent = opt.word;
    card.onclick = () => handleQuiz(card, opt);
    grid.appendChild(card);
  });

  // 自动朗读
  setTimeout(() => playWord(item.w.toLowerCase()), 300);
}

function handleQuiz(card, opt) {
  if (quizAnswered) return;
  quizAnswered = true;
  const item = quizList[quizIdx];
  const allCards = document.querySelectorAll('#qzGrid .quiz-opt');

  if (opt.isCorrect) {
    card.classList.add('ok');
    quizScore++;
    document.getElementById('qzScore').textContent = quizScore;
    document.getElementById('qzFeedback').textContent = '🎉 对啦！' + item.u + ' 是 ' + item.w;
    document.getElementById('qzFeedback').className = 'q-feedback ok';
    allCards.forEach(c => { if (c !== card) c.classList.add('dim'); });
    setTimeout(() => playWord(item.w.toLowerCase()), 300);
  } else {
    card.classList.add('no');
    document.getElementById('qzFeedback').textContent = '😊 答案是「' + item.w + '」哦';
    document.getElementById('qzFeedback').className = 'q-feedback no';
    allCards.forEach(c => {
      if (c.textContent === item.w) c.classList.add('ok');
      if (c !== card && c.textContent !== item.w) c.classList.add('dim');
    });
    setTimeout(() => playWord(item.w.toLowerCase()), 500);
  }

  // 自动下一题
  setTimeout(() => {
    quizIdx++;
    if (quizIdx >= quizList.length) {
      document.getElementById('qzFeedback').textContent = '🏆 全部完成！对了 ' + quizScore + ' 题！';
      document.getElementById('qzGrid').innerHTML = '';
      setTimeout(() => backToLearn(), 2500);
    } else {
      renderQuiz();
    }
  }, 1800);
}

document.getElementById('qzSpeak').onclick = () => {
  playWord(quizList[quizIdx].w.toLowerCase());
};

function backToLearn() {
  document.getElementById('quizMode').classList.add('hidden');
  document.getElementById('learnMode').classList.remove('hidden');
  renderLearn();
}

// ============================================================
//  事件绑定
// ============================================================
document.getElementById('speakBtn').onclick = speakCurrentLetter;
function stopAudio() {
  speakAbort = true;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  speechSynthesis.cancel();
  document.getElementById('speakBtn').classList.remove('speaking');
}

document.getElementById('prevBtn').onclick = () => {
  stopAudio();
  currentIdx = (currentIdx - 1 + 26) % 26;
  renderLearn();
};
document.getElementById('nextBtn').onclick = () => {
  stopAudio();
  currentIdx = (currentIdx + 1) % 26;
  renderLearn();
};
document.getElementById('goQuizBtn').onclick = startQuiz;
document.getElementById('backBtn').onclick = backToLearn;

// ============================================================
//  工具
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
//  启动
// ============================================================
// 首次点击预热语音（iOS 必须在用户手势后播放）
document.addEventListener('click', warmupSpeech, { once: true });
document.addEventListener('touchstart', warmupSpeech, { once: true });

renderLearn();
</script>
</body>
</html>
